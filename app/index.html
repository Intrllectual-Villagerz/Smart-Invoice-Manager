<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invoice Manager</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://www.paypal.com/sdk/js?client-id=BAAmBeGVQoex4pwq2tXIg7J-KJkivIFHHRw_enngMYnQqQZct3EmGPUX0ZFxnVFzu3VDvWDq_OHWAhd1ms&components=hosted-buttons&currency=USD"></script>

    <style>

*{box-sizing:border-box}

:root{
--bg:#f4f7fb;
--card:#ffffff;
--primary:#4f46e5;
--text:#111827;
--border:#e5e7eb;
--success:#10b981;
--danger:#ef4444
}

[data-theme="dark"]{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--border:#334155
}

body{
margin:0;
font-family:"Segoe UI";
background:var(--bg);
color:var(--text)
}

.container{
max-width:520px;
margin:auto;
padding:20px
}

.logo{
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#4f46e5,#06b6d4,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}

nav{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:15px
}

nav button{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
cursor:pointer;
font-weight:600
}

.card{
background:var(--card);
padding:18px;
border-radius:14px;
border:1px solid var(--border);
margin-bottom:15px
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid var(--border)
}

button{
padding:10px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
cursor:pointer;
width:100%
}

.remove-item{
background:#ef4444
}

.status-paid{
background:var(--success);
color:white;
padding:3px 8px;
border-radius:8px;
font-size:12px
}

.status-unpaid{
background:var(--danger);
color:white;
padding:3px 8px;
border-radius:8px;
font-size:12px
}

</style>
</head>

<body>

<div class="container">

    <h2 class="logo">Smart Invoice Manager</h2>

    <nav>
        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('create')">Create</button>
        <button onclick="showPage('clients')">Clients</button>
        <button onclick="showPage('history')">Invoices</button>
        <button onclick="showPage('store')">Store</button>
        <button onclick="showPage('settings')">Settings</button>
    </nav>

    <!-- DASHBOARD -->

    <div id="dashboard" class="page">

        <div class="card">
            <h3>Analytics</h3>
            Revenue: R<span id="revenue">0</span><br>
            Pending: R<span id="pending">0</span><br>
            Invoices: <span id="invcount">0</span><br>
            Clients: <span id="clientcount">0</span>
        </div>

        <div class="card">
            <h3>Plan</h3>
            Current Plan: <b id="planName"></b><br>
            Invoices Used: <span id="used"></span>
        </div>

    </div>

    <!-- CREATE -->

    <div id="create" class="page" style="display:none">

        <div class="card">

            <select id="clientSelect"></select>

            <input id="clientName" placeholder="Client name">

            <input id="clientEmail" placeholder="Client email">

            <input type="date" id="dueDate">

            <button onclick="saveClient()">Save Client</button>

        </div>

        <div class="card">

            <h3>Items</h3>

            <table id="items"></table>

            <button onclick="addItem()">Add Item</button>

        </div>

        <div class="card">

            Subtotal R<span id="subtotal">0</span><br>
            VAT R<span id="vat">0</span><br>
            Total R<span id="total">0</span>

        </div>

        <div class="card">

            <select id="method">
                <option>Cash</option>
                <option>EFT</option>
                <option>Card</option>
            </select>

            <select id="status">
                <option>Unpaid</option>
                <option>Paid</option>
            </select>

            <button onclick="createInvoice()">Generate Invoice</button>

            <button onclick="sendWhatsApp()">Send WhatsApp</button>

        </div>

    </div>

    <!-- CLIENTS -->

    <div id="clients" class="page" style="display:none">
        <div class="card" id="clientList"></div>
    </div>

    <!-- HISTORY -->

    <div id="history" class="page" style="display:none">

        <div class="card">
            <input placeholder="Search invoice" oninput="searchInvoices(this.value)">
        </div>

        <div class="card" id="invoiceHistory"></div>

    </div>

    <!-- STORE -->

    <div id="store" class="page" style="display:none">

        <div class="card"><h3>Standard Pack</h3><div id="paypal-container-3E83DZHBFHNEW"></div></div>

        <div class="card"><h3>Gold Pack</h3><div id="paypal-container-JFEV85WTGMCKC"></div></div>

        <div class="card"><h3>Platinum Pack</h3><div id="paypal-container-PLATINUM"></div></div>

        <div class="card"><h3>Diamond Pack</h3><div id="paypal-container-DIAMOND"></div></div>

        <div class="card"><h3>Elite Pack</h3><div id="paypal-container-ELITE"></div></div>

        <div class="card"><h3>Unlimited Pack</h3><div id="paypal-container-UNLIMITED"></div></div>

    </div>

    <!-- SETTINGS -->

    <div id="settings" class="page" style="display:none">

        <div class="card">
            <button onclick="toggleTheme()">Toggle Theme</button>
        </div>

        <div class="card">
            Upload Logo
            <input type="file" onchange="uploadLogo(event)">
        </div>

    </div>

</div>

<script>

/* ---------- PACKS ---------- */

const PACKS={
free:5,
standard:50,
gold:100,
platinum:300,
diamond:400,
elite:500,
unlimited:Infinity
}

let plan=localStorage.getItem("plan")||"free"
let invoices=JSON.parse(localStorage.getItem("invoices"))||[]
let clients=JSON.parse(localStorage.getItem("clients"))||[]

/* ---------- NAV ---------- */

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none")
document.getElementById(id).style.display="block"
}

/* ---------- THEME ---------- */

function toggleTheme(){
let t=document.documentElement.getAttribute("data-theme")
document.documentElement.setAttribute("data-theme",t==="dark"?"light":"dark")
}

/* ---------- ITEMS ---------- */

function addItem(){
let table=document.getElementById("items")
let row=table.insertRow()

row.innerHTML=
`<td><input placeholder="Description"></td>
<td><input type="number" value="1"></td>
<td><input type="number" value="0"></td>
<td><button class="remove-item" onclick="removeItem(this)">Remove</button></td>`

row.querySelectorAll("input").forEach(i=>i.addEventListener("input",calcTotals))
}

function removeItem(btn){
btn.closest("tr").remove()
calcTotals()
}

/* ---------- TOTALS ---------- */

function calcTotals(){

let rows=document.querySelectorAll("#items tr")
let subtotal=0

rows.forEach(r=>{
let qty=r.cells[1].children[0].value
let price=r.cells[2].children[0].value
subtotal+=qty*price
})

let vat=subtotal*0.15
let total=subtotal+vat

subtotalEl.textContent=subtotal.toFixed(2)
vatEl.textContent=vat.toFixed(2)
totalEl.textContent=total.toFixed(2)

return {total}
}

const subtotalEl=document.getElementById("subtotal")
const vatEl=document.getElementById("vat")
const totalEl=document.getElementById("total")

/* ---------- INVOICE ---------- */

function nextInvoiceNumber(){
return "INV"+String(invoices.length+1).padStart(4,"0")
}

function createInvoice(){

if(invoices.length>=PACKS[plan]){
alert("Invoice limit reached.")
return
}

let totals=calcTotals()

let items=[]
document.querySelectorAll("#items tr").forEach(r=>{
items.push({
desc:r.cells[0].children[0].value,
qty:r.cells[1].children[0].value,
price:r.cells[2].children[0].value
})
})

let inv={
number:nextInvoiceNumber(),
client:clientName.value,
email:clientEmail.value,
method:method.value,
status:status.value,
items:items,
total:totals.total
}

invoices.push(inv)

localStorage.setItem("invoices",JSON.stringify(invoices))

renderInvoices()
updateAnalytics()

generatePDF(inv)

document.getElementById("items").innerHTML=""
addItem()

}

/* ---------- PDF ---------- */

function generatePDF(inv){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

doc.text("Invoice "+inv.number,20,20)
doc.text("Client: "+inv.client,20,30)

let y=50

inv.items.forEach(i=>{
doc.text(`${i.desc} x${i.qty} R${i.price}`,20,y)
y+=10
})

doc.text("Total: R"+inv.total,20,y+10)

doc.save(inv.number+".pdf")

}

/* ---------- CLIENTS ---------- */

function saveClient(){

clients.push({
name:clientName.value,
email:clientEmail.value
})

localStorage.setItem("clients",JSON.stringify(clients))

renderClients()

}

function renderClients(){

let box=document.getElementById("clientList")

box.innerHTML="<h3>Clients</h3>"

clients.forEach(c=>{
box.innerHTML+=`${c.name} - ${c.email}<br>`
})

let select=document.getElementById("clientSelect")

select.innerHTML=""

clients.forEach(c=>{
let opt=document.createElement("option")
opt.text=c.name
select.add(opt)
})

}

/* ---------- INVOICE HISTORY ---------- */

function renderInvoices(list=invoices){

let box=document.getElementById("invoiceHistory")

box.innerHTML="<h3>Invoices</h3>"

list.forEach(i=>{

let statusClass=i.status==="Paid"?"status-paid":"status-unpaid"

box.innerHTML+=
`<div>
<b>${i.number}</b><br>
${i.client}<br>
R${i.total}<br>
<span class="${statusClass}">${i.status}</span>
</div><hr>`
})

}

function searchInvoices(q){

let filtered=invoices.filter(i=>
i.number.includes(q) ||
i.client.toLowerCase().includes(q.toLowerCase())
)

renderInvoices(filtered)

}

/* ---------- ANALYTICS ---------- */

function updateAnalytics(){

let revenue=0
let pending=0

invoices.forEach(i=>{
if(i.status==="Paid") revenue+=Number(i.total)
else pending+=Number(i.total)
})

revenueEl.textContent=revenue
pendingEl.textContent=pending
invcountEl.textContent=invoices.length
clientcountEl.textContent=clients.length

planNameEl.textContent=plan
usedEl.textContent=invoices.length+" / "+PACKS[plan]

}

const revenueEl=document.getElementById("revenue")
const pendingEl=document.getElementById("pending")
const invcountEl=document.getElementById("invcount")
const clientcountEl=document.getElementById("clientcount")
const planNameEl=document.getElementById("planName")
const usedEl=document.getElementById("used")

/* ---------- WHATSAPP ---------- */

function sendWhatsApp(){

let msg=`Invoice for ${clientName.value}\nTotal R${totalEl.textContent}`

window.open("https://wa.me/?text="+encodeURIComponent(msg))

}

/* ---------- LOGO ---------- */

function uploadLogo(e){
let reader=new FileReader()
reader.onload=function(){
localStorage.setItem("logo",reader.result)
}
reader.readAsDataURL(e.target.files[0])
}

/* ---------- APK ---------- */

function downloadAPK(){
window.location.href="/downloads/smart-invoice.apk"
}

/* ---------- INSTALL APP ---------- */

let deferredPrompt

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault()
deferredPrompt=e
installBtn.style.display="block"
})

installBtn.addEventListener("click",async()=>{
if(deferredPrompt){
deferredPrompt.prompt()
await deferredPrompt.userChoice
deferredPrompt=null
}
})

/* ---------- PAYPAL ---------- */

paypal.HostedButtons({
hostedButtonId:"3E83DZHBFHNEW",
onApprove:()=>{plan="standard";localStorage.setItem("plan","standard");updateAnalytics()}
}).render("#paypal-container-3E83DZHBFHNEW")

paypal.HostedButtons({
hostedButtonId:"JFEV85WTGMCKC",
onApprove:()=>{plan="gold";localStorage.setItem("plan","gold");updateAnalytics()}
}).render("#paypal-container-JFEV85WTGMCKC")

paypal.HostedButtons({
hostedButtonId:"BUMT7UX62DDCE",
onApprove:()=>{plan="platinum";localStorage.setItem("plan","platinum");updateAnalytics()}
}).render("#paypal-container-PLATINUM")

paypal.HostedButtons({
hostedButtonId:"KV3DLLYYCVRFC",
onApprove:()=>{plan="diamond";localStorage.setItem("plan","diamond");updateAnalytics()}
}).render("#paypal-container-DIAMOND")

paypal.HostedButtons({
hostedButtonId:"9U7PBQJ673BSW",
onApprove:()=>{plan="elite";localStorage.setItem("plan","elite");updateAnalytics()}
}).render("#paypal-container-ELITE")

paypal.HostedButtons({
hostedButtonId:"A4VGJ78R77ZVQ",
onApprove:()=>{plan="unlimited";localStorage.setItem("plan","unlimited");updateAnalytics()}
}).render("#paypal-container-UNLIMITED")

renderInvoices()
renderClients()
updateAnalytics()
addItem()

/* ---------- SERVICE WORKER ---------- */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}


</script>

</body>
</html>
